name: Documentation improvement
description: Suggest a fix or improvement in documentation
title: "[docs] "
labels: ["documentation"]
body:
  - type: input
    id: page
    attributes:
      label: Page or file
      placeholder: "docs/en/personas/22-developer.md"
    validations:
      required: true
  - type: dropdown
    id: locale
    attributes:
      label: Locale
      options:
        - en
        - pt-br
        - es
        - all
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What is wrong or missing
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested change
