name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./site
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build per-persona ZIPs
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          OUT="site/public/downloads"
          mkdir -p "$OUT"
          shopt -s nullglob
          for kit in persona-kits/*/; do
            name=$(basename "$kit")
            # only consider kit dirs that match NN-slug pattern
            case "$name" in
              [0-9][0-9]-*) ;;
              *) continue ;;
            esac
            stage=$(mktemp -d)
            target="$stage/$name"
            mkdir -p "$target"
            # copy kit contents
            cp -R "$kit". "$target/"
            # bundle docs and personas content per locale
            for loc in en pt es; do
              if [ -f "docs/$loc/personas/$name.md" ]; then
                mkdir -p "$target/docs/$loc"
                cp "docs/$loc/personas/$name.md" "$target/docs/$loc/$name.md"
              fi
              if [ -f "site/src/content/personas/$loc/$name.mdx" ]; then
                mkdir -p "$target/content/$loc"
                cp "site/src/content/personas/$loc/$name.mdx" "$target/content/$loc/$name.mdx"
              fi
            done
            # include LICENSE and root README for context
            [ -f LICENSE ] && cp LICENSE "$target/LICENSE"
            [ -f README.md ] && cp README.md "$target/REPO-README.md"
            (cd "$stage" && zip -qr "$GITHUB_WORKSPACE/$OUT/$name.zip" "$name")
            rm -rf "$stage"
          done
          ls -la "$OUT"

      - name: Install dependencies
        run: npm install

      - name: Build Astro
        env:
          NODE_ENV: production
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
