server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;

    # Redirect bare root to the base path (Astro is configured with base=/agentic-sdlc-personas)
    location = / {
        return 302 /agentic-sdlc-personas/;
    }

    # Static assets: long cache, immutable
    location ~* \.(?:css|js|woff2?|ttf|otf|eot|svg|png|jpg|jpeg|gif|webp|ico|avif)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    # HTML: no cache
    location ~* \.html$ {
        add_header Cache-Control "no-cache, must-revalidate";
        try_files $uri $uri/ =404;
    }

    # Astro clean URLs under the base path
    location /agentic-sdlc-personas/ {
        try_files $uri $uri/index.html $uri.html =404;
    }

    # Pagefind client assets
    location /agentic-sdlc-personas/pagefind/ {
        try_files $uri =404;
    }

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json application/xml image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;

    access_log off;
    error_log /var/log/nginx/error.log warn;
}
